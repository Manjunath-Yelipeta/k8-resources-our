apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  labels:
    project: roboshop
    environment: dev
spec:
  selector:
    project: roboshop
    environment: dev
  ports:
  - name: name-of-service-port
    protocol: TCP
    port: 80
    targetPort: 80

---

apiVersion: v1
kind: Pod
metadata:
  name: nginx
  labels:
    project: roboshop
    environment: dev
    purpose: poc
spec:
  containers:
  - name: nginx
    image: nginx